<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WasteWise Pledge</title>
    <link rel="stylesheet" href="pledge.css">
</head>
<body>

<div class="container">

    <h1>WasteWise Green Citizen Pledge 🌱</h1>

    <p>
        I pledge to reduce waste, practice segregation,
        recycle responsibly, and encourage others to
        protect our environment.
    </p>

    <input
        type="text"
        id="pledgeName"
        placeholder="Enter Your Name"
    >

    <button onclick="takePledge()">
        Take The Pledge
    </button>

    <div id="message"></div>

</div>

<script type="module" src="pledge.js"></script>

</body>
</html>
